<!DOCTYPE html>

<!--Login Page -->

<html>
    <head>
        <title>Login - Campus Marketplace</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <h1>Campus Marketplace</h1>
            <p>Log in to browse items for sale and your listings.</p>
            <div>
                <label>Email:</label>
                <br/>
                <input type="email" id="emailInput">
            </div>
            <br/>
            <div>
                <label>Password:</label>
                <br/>
                <input type="password" id="passwordInput">
            </div>
            <br>
            <button class="btn btn-primary" id="signInButton">Log In</button>
            <p id="messageArea"></p>
        </div>
        <!-- Javascript call -->
        <script type="module" src="app.js"></script>
    </body>
</html>
